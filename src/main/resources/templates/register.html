<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Register - Pixel Vault')}"></head>
<body>
    <nav th:replace="~{layout :: navbar(false, null)}"></nav>

    <main class="container">
        <div class="auth-container">
            <div class="glass-card auth-card">
                <h2>Create Account</h2>
                <p class="subtitle">Join the ultimate gaming experience.</p>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}">
                    Error message
                </div>

                <form th:action="@{/register}" method="post">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required class="form-control" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
                </form>
                <p class="auth-switch">Already have an account? <a th:href="@{/login}">Login here</a></p>
            </div>
        </div>
    </main>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
