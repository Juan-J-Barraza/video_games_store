<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login - Pixel Vault')}"></head>
<body>
    <nav th:replace="~{layout :: navbar(false, null)}"></nav>

    <main class="container">
        <div class="auth-container">
            <div class="glass-card auth-card">
                <h2>Welcome Back</h2>
                <p class="subtitle">Enter your credentials to access the vault.</p>

                <div th:if="${param.error}" class="alert alert-danger">
                    Invalid username or password.
                </div>
                <div th:if="${param.registered}" class="alert alert-success">
                    Registration successful! Please log in.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required class="form-control" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>
                <p class="auth-switch">Don't have an account? <a th:href="@{/register}">Register here</a></p>
            </div>
        </div>
    </main>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
